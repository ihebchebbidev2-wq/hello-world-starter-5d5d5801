services:
  - type: web
    name: agritrack-api
    env: docker
    plan: starter
    region: frankfurt
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: AgriTrack API
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        sync: false
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: SANCTUM_TOKEN_EXPIRATION
        value: "10080"
      - key: RUN_SEEDERS
        value: "true"
